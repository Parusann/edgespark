name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: exactness + calibration + policy (numpy lane)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install core dependencies
        run: python -m pip install --upgrade pip numpy pyyaml pytest
      - name: Run the pure-numpy test suite
        run: pytest -q
        # The torch-gated tests (quantization) skip automatically without torch;
        # the correctness-critical acceptance/calibration/policy cores run here.

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install ruff
      - run: ruff check edgespark bench data train scripts demo
